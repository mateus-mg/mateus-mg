name: Update Repository Data

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # Daily at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-repos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Fetch repositories
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: python scripts/fetch_repos.py

      - name: Create Pull Request if data changed
        id: cpr
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git config user.name "Mateus Marques"
          git config user.email "mateusmarques2011@live.com"
          git add data/repos.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            BRANCH_NAME="auto-update/repos-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH_NAME"
            git commit -m "chore: auto-update repo data"
            git push origin "$BRANCH_NAME"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and merge PR
        if: steps.cpr.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "chore: auto-update repo data" \
            --body "Automated update of repository data via GitHub Actions." \
            --base main \
            --head ${{ steps.cpr.outputs.branch }})
          echo "Created PR: $PR_URL"
          gh pr merge "$PR_URL" --squash --delete-branch
