name: Update Repository Data

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # Daily at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-repos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Fetch repositories
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_repos.py

      - name: Commit and push if changed
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          # Configure git user (shows up in commit metadata)
          git config user.name "Mateus Marques"
          git config user.email "mateusmarques2011@live.com"
          
          # Setup remote with PAT for push
          git remote set-url origin "https://x-access-token:${DEPLOY_TOKEN}@github.com/${{ github.repository }}.git"
          
          git add data/repos.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update repo data"
            git push origin HEAD:${{ github.ref_name }}
          fi
