name: Update Repository Data

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # Daily at 00:00 UTC
  workflow_dispatch:

# NOTE: Using a Personal Access Token (PAT) only for the git push step
# so commits appear under your real account, not github-actions[bot].
# The default GITHUB_TOKEN is used for checkout and API calls.
# Create a PAT at: Settings > Developer settings > Personal access tokens
# Required scopes: repo (or public_repo) for classic tokens,
# or Contents (read+write) for fine-grained tokens.
# Add it as a repository secret named DEPLOY_TOKEN.

permissions:
  contents: read

jobs:
  update-repos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        # Uses default GITHUB_TOKEN for read access

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Fetch repositories
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_repos.py

      - name: Commit and push if changed
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git config user.name "Mateus Marques"
          git config user.email "mateusmarques2011@live.com"
          git add data/repos.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update repo data"
            git push https://x-access-token:${DEPLOY_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
          fi
