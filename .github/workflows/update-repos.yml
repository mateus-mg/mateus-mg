name: Update Repository Data

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # Daily at 00:00 UTC
  workflow_dispatch:

# NOTE: Using PAT (Personal Access Token) instead of GITHUB_TOKEN
# so commits appear under your real account, not github-actions[bot].
# Create a PAT at: Settings > Developer settings > Personal access tokens > Fine-grained tokens
# Required scopes: Contents (read+write) for this repository.
# Add it as a repository secret named PAT.

permissions:
  contents: read

jobs:
  update-repos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Fetch repositories
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: python scripts/fetch_repos.py

      - name: Commit and push if changed
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          git config user.name "Mateus Marques"
          git config user.email "mateusmarques2011@live.com"
          git add data/repos.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update repo data"
            git push https://x-access-token:${PAT}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
          fi
