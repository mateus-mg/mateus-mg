name: Generate GitHub Stats Images

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Create assets directory
        run: mkdir -p assets
        
      - name: Generate GitHub Stats Card
        run: |
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               "https://github-readme-stats.vercel.app/api?username=mateus-mg&show_icons=true&theme=tokyonight&include_all_commits=true&count_private=true&hide_border=true" \
               --output assets/github-stats.svg
          
      - name: Generate Top Languages Card
        run: |
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               "https://github-readme-stats.vercel.app/api/top-langs/?username=mateus-mg&layout=compact&langs_count=7&theme=tokyonight&hide_border=true" \
               --output assets/github-languages.svg
          
      - name: Generate Streak Stats Card
        run: |
          curl "https://github-readme-streak-stats.herokuapp.com/?user=mateus-mg&theme=tokyonight&hide_border=true" \
               --output assets/github-streak.svg
          
      - name: Commit and create Pull Request
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Configure git to use DEPLOY_TOKEN for authentication
          git remote set-url origin "https://x-access-token:${DEPLOY_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          
          git add assets/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Create a new branch with timestamp
          BRANCH_NAME="update-stats-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"
          git commit -m "chore: update GitHub stats images [skip ci]"
          git push origin "$BRANCH_NAME"
          
          # Create Pull Request using GitHub CLI with DEPLOY_TOKEN
          gh pr create \
            --title "chore: update GitHub stats images" \
            --body "Automated update of GitHub stats images." \
            --base main \
            --head "$BRANCH_NAME"
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
