name: Generate GitHub Stats

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=mateus-mg&show_icons=true&theme=tokyonight&include_all_commits=true&count_private=true&hide_border=true
          path: assets/github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Generate Top Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=mateus-mg&layout=compact&langs_count=7&theme=tokyonight&hide_border=true
          path: assets/github-languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Generate Streak Stats
        run: |
          curl -s "https://github-readme-streak-stats.herokuapp.com/?user=mateus-mg&theme=tokyonight&hide_border=true" \
               --output assets/github-streak.svg
          
      - name: Commit changes
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Configure git to use DEPLOY_TOKEN
          git remote set-url origin "https://x-access-token:${DEPLOY_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          
          git add assets/
          git diff --staged --quiet && exit 0
          
          git commit -m "chore: update GitHub stats images"
          git push origin HEAD:main
