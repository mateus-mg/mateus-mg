name: Generate GitHub Stats

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Generate Stats Card
        if: github.event_name != 'pull_request'
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=mateus-mg&show_icons=true&theme=tokyonight&include_all_commits=true&count_private=true&hide_border=true
          path: assets/github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Generate Top Languages Card
        if: github.event_name != 'pull_request'
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=mateus-mg&layout=compact&langs_count=7&theme=tokyonight&hide_border=true
          path: assets/github-languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Generate Streak Stats
        if: github.event_name != 'pull_request'
        run: |
          curl "https://github-readme-streak-stats.herokuapp.com/?user=mateus-mg&theme=tokyonight&hide_border=true" \
               --output assets/github-streak.svg
          
      - name: Create Pull Request
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Configure git to use DEPLOY_TOKEN for authentication
          git remote set-url origin "https://x-access-token:${DEPLOY_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          
          if git diff --quiet assets/; then
            echo "No changes"
            exit 0
          fi
          
          BRANCH="update-stats-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add assets/
          git commit -m "chore: update GitHub stats images"
          git push origin "$BRANCH"
          
          gh pr create \
            --title "chore: update GitHub stats images" \
            --body "Auto-generated GitHub stats cards" \
            --base main \
            --head "$BRANCH"

  auto-merge:
    runs-on: ubuntu-latest
    needs: generate
    if: "github.event_name == 'pull_request' && contains(fromJSON('[\"github-actions[bot]\", \"mateus-mg\"]'), github.event.pull_request.user.login) && github.event.pull_request.title == 'chore: update GitHub stats images'"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Auto-merge PR
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --delete-branch \
            --subject "chore: update GitHub stats images" \
            --admin
